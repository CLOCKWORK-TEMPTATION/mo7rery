# ──────────────────────────────────────────────────────────────────────────────
# سكريبت فحص المشكلات — يبحث عن TODO و FIXME وأنماط الجودة في كود المصدر
# ──────────────────────────────────────────────────────────────────────────────

name: Find Issues

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.28.0"

jobs:
  find-issues:
    name: "فحص مشكلات الكود (Find Issues)"
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: تثبيت الاعتماديات
        run: pnpm install --frozen-lockfile

      - name: تشغيل سكريبت فحص المشكلات
        run: pnpm run find:issues
