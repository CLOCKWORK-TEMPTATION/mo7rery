# ──────────────────────────────────────────────────────────────────────────────
# خط أنابيب التكامل المستمر الشامل — محرّر سيناريو عربي (mo7rery)
# يُطبِّق عشر خطوات تسلسلية إلزامية. أي فشل يوقف المسار بالكامل.
# ──────────────────────────────────────────────────────────────────────────────

name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

# إلغاء التشغيلات السابقة على نفس الفرع لتوفير الموارد
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
# متغيرات البيئة المشتركة
# ──────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.28.0"
  FILE_IMPORT_HOST: 127.0.0.1
  FILE_IMPORT_PORT: 8787
  ANTIWORD_PATH: /usr/bin/antiword
  ANTIWORDHOME: /usr/share/antiword

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 1: تهيئة البيئة وتثبيت الاعتماديات
  # ════════════════════════════════════════════════════════════════════════════
  install:
    name: "① تهيئة البيئة وتثبيت الاعتماديات"
    runs-on: ubuntu-latest
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: إعداد Node.js مع التخزين المؤقت
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: تثبيت الاعتماديات (frozen-lockfile)
        run: pnpm install --frozen-lockfile

      # تخزين مجلد node_modules لاستخدامه في الوظائف اللاحقة
      - name: حفظ ذاكرة التخزين المؤقت للاعتماديات
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 2: فحص وتصحيح التنسيق (Formatting)
  # ════════════════════════════════════════════════════════════════════════════
  format:
    name: "② فحص التنسيق (Prettier)"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: فحص التنسيق
        run: pnpm run format:check

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 3: فحص الأخطاء المنطقية (Linting)
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: "③ فحص الأخطاء المنطقية (ESLint)"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: فحص ESLint
        run: pnpm run lint

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 4: فحص الأنواع (Type Checking)
  # ════════════════════════════════════════════════════════════════════════════
  typecheck:
    name: "④ فحص الأنواع (TypeScript)"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: فحص الأنواع
        run: pnpm run typecheck

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 5: الاختبارات الوظيفية (Unit Testing)
  # ════════════════════════════════════════════════════════════════════════════
  test-unit:
    name: "⑤ الاختبارات الوظيفية (Unit)"
    needs: [format, lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: تشغيل اختبارات الوحدة
        run: pnpm run test:unit

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 6: اختبارات التكامل الحقيقي (Real Integration Testing)
  # ════════════════════════════════════════════════════════════════════════════
  test-integration:
    name: "⑥ اختبارات التكامل (Integration)"
    needs: [format, lint, typecheck]
    runs-on: ubuntu-latest
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: تثبيت antiword
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq antiword

      - name: تشغيل خادم file-import في الخلفية
        run: |
          pnpm run file-import:server > integration-server.log 2>&1 &
          echo $! > integration-server.pid

      - name: انتظار جاهزية الخادم
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://${{ env.FILE_IMPORT_HOST }}:${{ env.FILE_IMPORT_PORT }}/health" >/dev/null 2>&1; then
              echo "الخادم جاهز"
              exit 0
            fi
            sleep 1
          done
          echo "فشل بدء الخادم خلال 30 ثانية"
          cat integration-server.log
          exit 1

      - name: تشغيل اختبارات التكامل
        run: pnpm run test:integration

      - name: عرض سجل الخادم عند الفشل
        if: failure()
        run: cat integration-server.log || true

      - name: إيقاف الخادم
        if: always()
        run: |
          if [ -f integration-server.pid ]; then
            kill "$(cat integration-server.pid)" 2>/dev/null || true
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 7: اختبارات Harness (Contract + Pipeline)
  # ════════════════════════════════════════════════════════════════════════════
  test-harness:
    name: "⑦ اختبارات الحزام (Harness)"
    needs: [format, lint, typecheck]
    runs-on: ubuntu-latest
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: تثبيت antiword
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq antiword

      - name: تشغيل خادم file-import في الخلفية
        run: |
          pnpm run file-import:server > harness-server.log 2>&1 &
          echo $! > harness-server.pid

      - name: انتظار جاهزية الخادم
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://${{ env.FILE_IMPORT_HOST }}:${{ env.FILE_IMPORT_PORT }}/health" >/dev/null 2>&1; then
              echo "الخادم جاهز"
              exit 0
            fi
            sleep 1
          done
          echo "فشل بدء الخادم خلال 30 ثانية"
          cat harness-server.log
          exit 1

      - name: تشغيل اختبارات الحزام
        run: pnpm run test:harness

      - name: عرض سجل الخادم عند الفشل
        if: failure()
        run: cat harness-server.log || true

      - name: إيقاف الخادم
        if: always()
        run: |
          if [ -f harness-server.pid ]; then
            kill "$(cat harness-server.pid)" 2>/dev/null || true
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 8: بناء المشروع (Build)
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: "⑧ بناء المشروع (Production Build)"
    needs: [test-unit, test-integration, test-harness]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: بناء المشروع لبيئة الإنتاج
        run: pnpm run build

      # حفظ مخرجات البناء لاستخدامها في الخطوات اللاحقة
      - name: رفع مخرجات البناء
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 3

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 9: اختبار الدخان (Smoke Test)
  # ════════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: "⑨ اختبار الدخان (Smoke Test)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: تنزيل مخرجات البناء
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/

      - name: التحقق من وجود مخرجات البناء
        run: |
          echo "═══ فحص مجلد dist ═══"
          if [ ! -d "dist" ]; then
            echo "خطأ: مجلد dist غير موجود"
            exit 1
          fi

          echo "═══ محتويات مجلد dist ═══"
          ls -la dist/

          if [ ! -f "dist/index.html" ]; then
            echo "خطأ: ملف index.html غير موجود في مخرجات البناء"
            exit 1
          fi

          echo "═══ فحص ملفات JavaScript ═══"
          JS_COUNT=$(find dist -name "*.js" | wc -l)
          if [ "$JS_COUNT" -eq 0 ]; then
            echo "خطأ: لا توجد ملفات JavaScript في مخرجات البناء"
            exit 1
          fi
          echo "عدد ملفات JS: $JS_COUNT"

          echo "═══ فحص ملفات CSS ═══"
          CSS_COUNT=$(find dist -name "*.css" | wc -l)
          echo "عدد ملفات CSS: $CSS_COUNT"

          echo "═══ حجم مجلد dist ═══"
          du -sh dist/

          echo "اختبار الدخان: نجاح ✓"

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 7 (بديل): اختبارات E2E — Playwright
  # يعمل بالتوازي مع البناء لتسريع الخط
  # ════════════════════════════════════════════════════════════════════════════
  test-e2e:
    name: "⑦ₑ₂ₑ اختبارات من البداية للنهاية (E2E)"
    needs: [test-unit, test-integration, test-harness]
    runs-on: ubuntu-latest
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: استعادة الاعتماديات المُخزَّنة
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: تثبيت متصفحات Playwright
        run: npx playwright install --with-deps chromium

      - name: تثبيت antiword
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq antiword

      - name: تشغيل خادم file-import في الخلفية
        run: |
          pnpm run file-import:server > e2e-server.log 2>&1 &
          echo $! > e2e-server.pid

      - name: تشغيل اختبارات E2E
        run: pnpm run test:e2e

      - name: رفع تقرير Playwright عند الفشل
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: عرض سجل الخادم عند الفشل
        if: failure()
        run: cat e2e-server.log || true

      - name: إيقاف الخادم
        if: always()
        run: |
          if [ -f e2e-server.pid ]; then
            kill "$(cat e2e-server.pid)" 2>/dev/null || true
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # الخطوة 10: التحقق النهائي (Final Gate)
  # ════════════════════════════════════════════════════════════════════════════
  final-gate:
    name: "⑩ البوابة النهائية — جاهز للإنتاج"
    needs: [smoke-test, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: التحقق النهائي
        run: |
          echo "══════════════════════════════════════════════"
          echo "  جميع الخطوات العشر اكتملت بنجاح"
          echo "  المشروع جاهز للنشر في بيئة الإنتاج"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "  ① تهيئة البيئة .............. ✓"
          echo "  ② فحص التنسيق .............. ✓"
          echo "  ③ فحص ESLint ............... ✓"
          echo "  ④ فحص الأنواع .............. ✓"
          echo "  ⑤ اختبارات الوحدة .......... ✓"
          echo "  ⑥ اختبارات التكامل ......... ✓"
          echo "  ⑦ اختبارات الحزام .......... ✓"
          echo "  ⑦ₑ₂ₑ اختبارات E2E ......... ✓"
          echo "  ⑧ بناء الإنتاج ............ ✓"
          echo "  ⑨ اختبار الدخان ........... ✓"
          echo "  ⑩ البوابة النهائية ......... ✓"
          echo ""
          echo "══════════════════════════════════════════════"
